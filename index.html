<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yuqian's Portfolio</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Inter:wght@400;600;700&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
</head>
<body>
  <div class="corkboard">

    <!-- ── Header ── -->
    <header class="header">
      <h1 class="name">Yuqian</h1>
      <nav class="social-links" aria-label="Social links">
        <a
          href="https://www.youtube.com/@yuqiandeng"
          class="social-btn youtube"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="YouTube"
        >
          <i class="fab fa-youtube"></i>
        </a>
        <a
          href="https://www.linkedin.com/in/yuqian-deng-997538304/"
          class="social-btn linkedin"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="LinkedIn"
        >
          <i class="fab fa-linkedin-in"></i>
        </a>
        <a
          href="https://github.com/dengdengsjtu"
          class="social-btn github"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="GitHub"
        >
          <i class="fab fa-github"></i>
        </a>
      </nav>
    </header>

    <!-- ── Pinboard ── -->
    <main class="pinboard">

      <a href="experience.html" class="pin-card" style="--rot: -2.5deg;">
        <div class="tack tack-coral"></div>
        <div class="paper">
          <span class="label">Working / Project Experience</span>
        </div>
      </a>

      <a href="life.html" class="pin-card" style="--rot: 1.8deg;">
        <div class="tack tack-teal"></div>
        <div class="paper">
          <span class="label">Beyond the Work</span>
        </div>
      </a>

    </main>

  </div>
</body>
</html>
